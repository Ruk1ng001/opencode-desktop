name: auto-upgrade-canvas

# 每日自动升级 infinite-canvas 上游基线（brand/CANVAS_BASE_TAG + CANVAS_BASE_SHA + submodule gitlink）。
#
# 设计（对齐 opencode 侧 auto-upgrade.yml 与 brand/ 补丁叠加层架构）：
#   - infinite-canvas submodule 永远锁在「干净的上游 tag」，定制全在 brand/canvas-patches/*.patch；
#   - 「升级」= 把基线 tag 推进到上游最新稳定 tag，并验证画布补丁仍能干净重放 + 能构建。
#
# 与 opencode 版的关键差异：
#   - 画布不独立发版：它内嵌进 opencode desktop 构建（out/renderer/canvas/）。故本流程只
#     「推进基线 + 推 main」，**不推 dokng tag、不触发 release.yml**——画布的变更会搭下一次
#     opencode 升级（auto-upgrade.yml）或手动发布的车一起出包，避免 opencode 未变时空发版。
#   - 验证步骤是画布 build（cd web && bun install && bun run build），非 typecheck。
#
# 流程（单 job，任一步失败即报错、GitHub 通知维护者手动介入）：
#   detect   —— fetch submodule tag，筛出最新稳定 tag（vX.Y.Z），与 CANVAS_BASE_TAG 比较；
#               无新版本 → no-op 成功退出；有降级风险 → 不动。
#   validate —— submodule 干净 checkout 到新 tag → 按 NN 序 strict 重放画布补丁 →
#               cd web && bun install && bun run build（VITE_BASE=/canvas/，与 desktop 打包一致）。
#   commit   —— 全通过 → 恢复 submodule 干净（gitlink 指向干净 tag）→
#               更新 CANVAS_BASE_TAG/SHA/gitlink → 提交 → 推 main（不推 tag）。
#
# 触发：
#   - schedule：UTC 47 17 = 北京时间次日 01:47（凌晨，错开 opencode 的 00:23，减少并发写 main）；
#   - workflow_dispatch：手动随时触发。

on:
  schedule:
    # 北京时间 01:47（UTC+8） → UTC 17:47。错开 opencode auto-upgrade（UTC 16:23）与整点。
    - cron: "47 17 * * *"
  workflow_dispatch:

# 同时只跑一个画布升级流水线，避免并发写 main；也与 opencode 升级用不同 group（可各自独立跑）。
concurrency:
  group: auto-upgrade-canvas
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  upgrade:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout（含 submodule；用 PAT 保持与 opencode 升级同款推送凭据）
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0
          # RELEASE_PAT：repo 权限 PAT，与 opencode 升级共用。画布升级只推 main、不推 tag，
          # 用 PAT 保持凭据一致性（后续 git push 带 PAT）。
          token: ${{ secrets.RELEASE_PAT }}

      - name: 检测上游最新稳定 tag
        id: detect
        run: |
          set -euo pipefail
          CURRENT="$(tr -d '[:space:]' < brand/CANVAS_BASE_TAG)"
          echo "当前画布基线 tag：$CURRENT"

          # 拉取 submodule 所有 tag（origin = basketikun/infinite-canvas）。
          git -C infinite-canvas fetch --tags --quiet origin

          # 只认稳定版 tag vX.Y.Z。此正则天然排除上游历史里的脏 tag v.0.1.0（多一个点、非三段数字）。
          LATEST="$(git -C infinite-canvas tag -l 'v*' \
            | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' \
            | sort -V | tail -1)"
          echo "上游最新稳定 tag：${LATEST:-<无>}"

          if [ -z "$LATEST" ]; then
            echo "未找到任何稳定 tag，异常退出。" >&2
            exit 1
          fi

          # 降级保护：只有当 LATEST 严格新于 CURRENT 时才升级。
          NEWEST="$(printf '%s\n%s\n' "$CURRENT" "$LATEST" | sort -V | tail -1)"
          if [ "$LATEST" != "$CURRENT" ] && [ "$NEWEST" = "$LATEST" ]; then
            echo "发现新版本：$CURRENT → $LATEST"
            echo "need=true" >> "$GITHUB_OUTPUT"
            echo "latest=$LATEST" >> "$GITHUB_OUTPUT"
          else
            echo "已是最新（或当前基线更新），无需升级。"
            echo "need=false" >> "$GITHUB_OUTPUT"
          fi

      - name: 安装 Bun
        if: steps.detect.outputs.need == 'true'
        uses: oven-sh/setup-bun@v2

      - name: 切到新 tag 并按 NN 序重放画布补丁（strict apply）
        if: steps.detect.outputs.need == 'true'
        env:
          LATEST: ${{ steps.detect.outputs.latest }}
        run: |
          set -euo pipefail
          # 干净 checkout 到新 tag（detached）；清掉任何残留，确保基线纯净。
          git -C infinite-canvas checkout --quiet "$LATEST"
          git -C infinite-canvas reset --hard --quiet
          git -C infinite-canvas clean -fdq

          # 用统一的画布重放脚本（strict apply）落地补丁。此刻 CANVAS_BASE_SHA 还是旧基线，
          # 脚本会 warn HEAD≠BASE_SHA，但不致命：apply 模式只要求工作区干净 + 补丁精确适用；
          # 任一补丁失败即非 0 → 步骤失败 → 通知维护者手动介入（上游漂移需人工修补丁）。
          echo "按 NN 序重放画布补丁到 $LATEST："
          scripts/apply-canvas-patches.sh
          echo "全部画布补丁 apply 成功。"

      - name: 安装依赖 + 构建画布（VITE_BASE=/canvas/，与 desktop 打包一致）
        if: steps.detect.outputs.need == 'true'
        working-directory: infinite-canvas/web
        env:
          # 与 desktop 的 build-canvas.ts 完全一致——验证的就是实际内嵌产物的构建路径。
          VITE_BASE: /canvas/
        run: |
          set -euo pipefail
          # bun install 加重试：npm registry 偶发单包 tarball 下载失败，重试 3 次消抖动
          # （与 opencode 升级同款策略）。
          for attempt in 1 2 3; do
            bun install && break
            if [ "$attempt" = 3 ]; then
              echo "bun install 连续 3 次失败，放弃。" >&2
              exit 1
            fi
            echo "bun install 第 $attempt 次失败，$((attempt * 15))s 后重试…" >&2
            sleep $((attempt * 15))
          done
          # 构建画布产物：验证补丁应用后画布仍能干净构建（依赖仓库根的 VERSION / CHANGELOG.md，
          # vite.config.ts readFileSync 无 try/catch，缺文件即构建失败——submodule 完整则天然在位）。
          bun run build

      - name: 校验通过 → 更新基线、提交并推送 main（不推 tag）
        if: steps.detect.outputs.need == 'true'
        env:
          LATEST: ${{ steps.detect.outputs.latest }}
        run: |
          set -euo pipefail
          # 恢复 submodule 干净：撤销临时 apply 的补丁 + build 产物，gitlink 记录干净 tag 的 HEAD。
          git -C infinite-canvas reset --hard --quiet
          git -C infinite-canvas clean -fdq

          NEWSHA="$(git -C infinite-canvas rev-parse HEAD)"
          echo "新画布基线：$LATEST（$NEWSHA）"

          # 更新基线双文件（保留尾换行，与既有格式一致）。
          printf '%s\n' "$LATEST" > brand/CANVAS_BASE_TAG
          printf '%s\n' "$NEWSHA" > brand/CANVAS_BASE_SHA

          git add brand/CANVAS_BASE_TAG brand/CANVAS_BASE_SHA infinite-canvas
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "chore(canvas): 自动升级画布基线到 ${LATEST}（每日自动）"

          # 只推 main 保存基线推进；**不推 dokng tag**——画布不独立发版，其变更搭下一次
          # opencode 升级 / 手动发布的车出包（见文件头说明）。
          git push origin HEAD:main
          echo "已推送 main（画布基线 → $LATEST）。未推 tag：画布随下次 opencode 发版一起出包。"
