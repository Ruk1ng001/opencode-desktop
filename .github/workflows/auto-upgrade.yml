name: auto-upgrade

# 每日自动升级 opencode 上游基线（brand/BASE_TAG + BASE_SHA + submodule gitlink）。
#
# 设计（对齐 brand/ 补丁叠加层架构）：
#   - submodule 永远锁在「干净的上游 tag」，定制全在 brand/patches/*.patch；
#   - 「升级」= 把基线 tag 推进到上游最新稳定 tag，并验证所有补丁仍能干净重放。
#
# 流程（单 job，任一步失败即报错、GitHub 通知维护者手动介入）：
#   detect   —— fetch submodule tag，筛出最新稳定 tag（vX.Y.Z），与 BASE_TAG 比较；
#               无新版本 → no-op 成功退出；有降级风险（当前反而更新）→ 不动。
#   validate —— submodule 干净 checkout 到新 tag → 按 NN 序 strict `git apply` 全部补丁
#               （与 release.yml 完全一致的重放方式）→ bun install → typecheck(app+desktop)。
#   commit   —— 全通过 → 恢复 submodule 干净（gitlink 指向干净 tag，不含补丁）→
#               更新 BASE_TAG/BASE_SHA/gitlink → 提交 → 用 PAT 直推 main。
#
# 为什么用 PAT 推送：
#   GitHub 默认的 GITHUB_TOKEN 推 main 不会触发其它 workflow（防无限循环），
#   而升级后需要触发 release.yml 自动出包，故用 RELEASE_PAT（repo 权限）推送。
#
# 触发：
#   - schedule：UTC 16:23 = 北京时间次日 00:23（凌晨，错开整点）；
#   - workflow_dispatch：手动随时触发。

on:
  schedule:
    # 北京时间 00:23（UTC+8） → UTC 16:23。避开整点，减少与上游发布高峰重叠。
    - cron: "23 16 * * *"
  workflow_dispatch:

# 同时只跑一个升级流水线，避免并发写 main。
concurrency:
  group: auto-upgrade
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  upgrade:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout（含 submodule；用 PAT 以便推送能触发 release.yml）
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0
          # RELEASE_PAT：repo 权限的 PAT。用它 checkout，后续 git push 即带 PAT 凭据，
          # 推 main 才能触发 release.yml 自动出包（默认 GITHUB_TOKEN 不触发其它 workflow）。
          token: ${{ secrets.RELEASE_PAT }}

      - name: 检测上游最新稳定 tag
        id: detect
        run: |
          set -euo pipefail
          CURRENT="$(tr -d '[:space:]' < brand/BASE_TAG)"
          echo "当前基线 tag：$CURRENT"

          # 拉取 submodule 所有 tag（origin = anomalyco/opencode，已同步上游）。
          git -C opencode fetch --tags --quiet origin

          # 只认稳定版 tag vX.Y.Z（排除 -rc / pr-*/ beta 等），按语义版本取最大。
          LATEST="$(git -C opencode tag -l 'v*' \
            | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' \
            | sort -V | tail -1)"
          echo "上游最新稳定 tag：${LATEST:-<无>}"

          if [ -z "$LATEST" ]; then
            echo "未找到任何稳定 tag，异常退出。" >&2
            exit 1
          fi

          # 降级保护：只有当 LATEST 严格新于 CURRENT 时才升级。
          NEWEST="$(printf '%s\n%s\n' "$CURRENT" "$LATEST" | sort -V | tail -1)"
          if [ "$LATEST" != "$CURRENT" ] && [ "$NEWEST" = "$LATEST" ]; then
            echo "发现新版本：$CURRENT → $LATEST"
            echo "need=true" >> "$GITHUB_OUTPUT"
            echo "latest=$LATEST" >> "$GITHUB_OUTPUT"
          else
            echo "已是最新（或当前基线更新），无需升级。"
            echo "need=false" >> "$GITHUB_OUTPUT"
          fi

      - name: 安装 Bun
        if: steps.detect.outputs.need == 'true'
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: opencode/package.json

      - name: 切到新 tag 并按 NN 序重放补丁（strict apply）
        if: steps.detect.outputs.need == 'true'
        env:
          LATEST: ${{ steps.detect.outputs.latest }}
        run: |
          set -euo pipefail
          # 干净 checkout 到新 tag（detached）；清掉任何残留，确保基线纯净。
          git -C opencode checkout --quiet "$LATEST"
          git -C opencode reset --hard --quiet
          git -C opencode clean -fdq

          # 在改动 submodule 前先做纯格式/manifest 预检；corrupt patch 必须零副作用提前失败。
          scripts/apply-patches.sh --preflight

          # 用统一的重放脚本（strict apply）落地补丁——与 release.yml 同一来源，避免逻辑漂移。
          # 此刻 brand/BASE_SHA 还是旧基线（升级成功后才刷新），脚本会 warn HEAD≠BASE_SHA，
          # 但不致命：apply 模式只要求 opencode/ 工作区干净 + 补丁精确适用；任一补丁失败即非 0
          # → 步骤失败 → 通知维护者手动介入。
          echo "按 NN 序重放补丁到 ${LATEST}："
          if scripts/apply-patches.sh; then
            echo "全部补丁 apply 成功。"
          else
            # strict 失败：上游 $LATEST 很可能改到了补丁热点文件（router/layout/server/vite 等）。
            # 直接在当前 $LATEST 工作区逐补丁 3way 试应用，把冲突 hunk 落成 .rej 打印出来——
            # 这诊断基于正确的新基线（BASE_SHA 此刻还是旧的，用 --check-3way 会基于旧基线不准），
            # 让维护者一眼看到哪个补丁的哪些 hunk 撞上了上游改动，缩短 rebase 定位时间。
            echo "::group::strict apply 失败——3way 漂移诊断（基于新基线 ${LATEST}）" >&2
            git -C opencode reset --hard --quiet
            git -C opencode clean -fdq
            for p in brand/patches/*.patch; do
              [ -e "$p" ] || continue
              name="$(basename "$p")"
              if git -C opencode apply --3way "$PWD/$p" >/dev/null 2>&1; then
                echo "  3way OK   $name" >&2
              else
                echo "  3way 冲突 ${name}：" >&2
                git -C opencode apply --3way --reject "$PWD/$p" 2>&1 | sed 's/^/      /' >&2 || true
                find opencode -name '*.rej' -print 2>/dev/null | sed 's/^/      rej: /' >&2 || true
              fi
            done
            git -C opencode reset --hard --quiet; git -C opencode clean -fdq
            echo "::endgroup::" >&2
            echo "补丁 strict apply 失败，需人工把补丁 rebase 到 ${LATEST}（见上方 3way 诊断）。" >&2
            exit 1
          fi

      - name: 安装依赖 + typecheck（app + desktop）
        if: steps.detect.outputs.need == 'true'
        working-directory: opencode
        run: |
          set -euo pipefail
          # [dokng] bun install 加重试：npm registry 偶发单包 tarball 下载失败（CI 曾遇
          # @esbuild/darwin-x64 这类平台可选依赖抽风），一次失败即中断。重试 3 次、间隔递增
          # （15s/30s）消除瞬时网络抖动；三次仍失败才真正报错（set -e 下走 exit 1）。
          for attempt in 1 2 3; do
            bun install && break
            if [ "$attempt" = 3 ]; then
              echo "bun install 连续 3 次失败，放弃。" >&2
              exit 1
            fi
            echo "bun install 第 $attempt 次失败，$((attempt * 15))s 后重试…" >&2
            sleep $((attempt * 15))
          done
          # 只 typecheck 定制涉及的两个包，快速验证补丁应用后类型仍自洽。
          bun turbo typecheck --filter=@opencode-ai/app --filter=@opencode-ai/desktop

      - name: 校验通过 → 更新基线、提交并推送 main
        if: steps.detect.outputs.need == 'true'
        env:
          LATEST: ${{ steps.detect.outputs.latest }}
        run: |
          set -euo pipefail
          # 恢复 submodule 干净：撤销临时 apply 的补丁，gitlink 记录的是干净 tag 的 HEAD。
          git -C opencode reset --hard --quiet
          git -C opencode clean -fdq

          NEWSHA="$(git -C opencode rev-parse HEAD)"
          echo "新基线：${LATEST}（${NEWSHA}）"

          # 更新基线双文件（保留尾换行，与既有格式一致）。
          printf '%s\n' "$LATEST" > brand/BASE_TAG
          printf '%s\n' "$NEWSHA" > brand/BASE_SHA

          git add brand/BASE_TAG brand/BASE_SHA opencode
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "chore(opencode): 自动升级基线到 ${LATEST}（每日自动）"

          # 推 main（保存基线推进）。GITHUB_TOKEN 推送不会触发其它 workflow，
          # 故用 PAT checkout 后的凭据推送；真正触发出包的是下方推送的 dokng tag。
          # 加 pull --rebase + 重试：定时任务与手动触发 / 维护者推送可能并发，
          # 裸 push 遇 non-fast-forward 会被拒。重试 3 次，每次先 rebase 再推。
          pushed=false
          for attempt in 1 2 3; do
            if git push origin HEAD:main; then
              pushed=true
              break
            fi
            echo "push main 第 $attempt 次失败（可能 non-fast-forward），rebase 后重试…" >&2
            git fetch origin main --quiet || true
            # rebase 到最新 origin/main；基线文件冲突极少（只有并发升级才可能），
            # 冲突时放弃自动 rebase，让 job 失败等人工介入（不强推、不覆盖他人提交）。
            git rebase origin/main || { git rebase --abort || true; break; }
          done
          [ "$pushed" = true ] || { echo "push main 连续 3 次失败，放弃（无污染，可重跑）。" >&2; exit 1; }
          echo "已推送 main。"

          # 计算下一个 dokng 版本 tag（vX.Y.Z-dokng.N，基于新基线 BASE_TAG），打 tag 并推送。
          # release.yml 触发器是 push tags v*，推这个 tag 才会真正触发自动出包（复用现有版本号规则）。
          git fetch --tags --quiet origin || true
          # next-dokng-version.sh 的 stdout 只打「纯 tag 值」一行（KEY=VALUE 只进
          # GITHUB_OUTPUT），故 $() 直接拿到干净 tag，无需再 sed 抽取。
          NEWTAG="$(scripts/next-dokng-version.sh)"
          [ -n "$NEWTAG" ] || { echo "计算 dokng tag 失败（输出为空）。" >&2; exit 1; }
          echo "新 dokng 版本 tag：$NEWTAG"
          git tag "$NEWTAG"
          git push origin "$NEWTAG"
          echo "已推送 tag ${NEWTAG}，release.yml 将据此自动出包。"
