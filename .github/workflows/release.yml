name: release

# US-009 —— dokng 统一 CI 流水线：升级基线 / 检测 / 构建 / 打包 / 发布
#
# 本文件由三个原独立 workflow 合并而来（保留全部能力，仅收敛为单文件便于维护）：
#   - auto-upgrade.yml         → 下方 upgrade-opencode job
#   - auto-upgrade-canvas.yml  → 下方 upgrade-canvas job
#   - release.yml（本文件原体）→ 下方 detect / package / release 三段 job
#
# 五个 job 按「事件类型」互斥分流（每个 job 用 if: 只在对应触发下运行，其余事件里被 skip）：
#
#   upgrade-opencode —— 每日升级 opencode 基线（brand/BASE_TAG + BASE_SHA + gitlink）。
#                       验证补丁 strict 重放 + typecheck 通过 → 推 main + 打 dokng tag。
#                       打的 tag 经 RELEASE_PAT 推送，触发本 workflow 的 push:tag → 走 detect/package/release。
#   upgrade-canvas   —— 每日升级 infinite-canvas 基线（brand/CANVAS_BASE_TAG + SHA + gitlink）。
#                       验证画布补丁 strict 重放 + build 通过 → 推 main（不打 tag，画布不独立发版）。
#   detect           —— 计算下一个 dokng 发布版本号 <opencode版本>-dokng.N，判断是否需要发布。
#   package          —— 四平台 runner 出安装包（.dmg×2 / .exe / .AppImage）。
#   release          —— 汇总产物，创建/更新 GitHub Release + 合并 latest*.yml + R2 双写。
#
# 【为何 tag-push 跨 run 触发仍成立】upgrade-opencode 用 RELEASE_PAT 推 tag（非 GITHUB_TOKEN，
#   后者推的 tag 不触发任何 workflow，防无限循环）。PAT 推 tag → 触发本文件 push:tags → 起一个
#   **新的 run**，该 run 的 detect/package/release 段执行。合并到单文件不改变这个事件驱动链路。
#
# 【为何不监听 push:main】历史上曾同时监听 push:main + push:tag，导致升级成功后一次推 main、
#   一次推 tag，两条 release 流水线并发、版本号碰撞、产物互相覆盖。改为只认 tag：tag 名即确定
#   版本号（无歧义），平时推代码到 main 不触发无谓全平台构建；要发布就打 tag（自动或手动）。
#
# 安全（验收标准 #3）：
#   - 渠道值 / 密钥全部经 GitHub Secret 注入为环境变量，仓库与工作流文件里不含明文；
#   - detect / package 段用 ::add-mask:: 把注入的敏感值登记为日志掩码，误打印显示为 ***；
#   - 这些值只在需要的 job env 里出现，绝不写入 git、不 echo 到日志。
#
# 平台矩阵严格对齐验收标准 #4：.dmg=macOS runner，.exe=windows runner，.AppImage=linux runner。

on:
  schedule:
    # 北京时间 00:23（UTC+8） → UTC 16:23：opencode 基线升级。避开整点，减少与上游发布高峰重叠。
    - cron: "23 16 * * *"
    # 北京时间 01:47（UTC+8） → UTC 17:47：画布基线升级。错开 opencode（UTC 16:23）与整点，减少并发写 main。
    - cron: "47 17 * * *"
  workflow_dispatch:
    inputs:
      mode:
        description: "手动运行模式：release=出包发布 / upgrade-opencode=升级 opencode 基线 / upgrade-canvas=升级画布基线"
        required: true
        type: choice
        default: release
        options:
          - release
          - upgrade-opencode
          - upgrade-canvas
      force_version:
        description: "【release 模式】强制指定发布版本号（如 v1.17.15-dokng.3）；留空则自动计算"
        required: false
        type: string
      force_release:
        description: "【release 模式】即使无新版本也强制走发布"
        required: false
        type: boolean
        default: false
  push:
    tags:
      - "v*-dokng.*"

# 按事件动态选 concurrency，完整保留原三个 workflow 的隔离语义：
#   - opencode 升级 → group=auto-upgrade（与原 auto-upgrade.yml 一致，cancel-in-progress=false 不打断进行中升级）
#   - 画布升级    → group=auto-upgrade-canvas（与原 auto-upgrade-canvas.yml 一致，同组独立不互斥）
#   - 发布        → group=release-<ref>（同一 ref 只跑一个发布流水线，新推送取消旧的）
# && / || 短路实现三分支「三元」：cond 为真取字符串（真值短路），否则落到下一个分支。
concurrency:
  group: >-
    ${{
      ((github.event_name == 'schedule' && github.event.schedule == '23 16 * * *') || (github.event_name == 'workflow_dispatch' && inputs.mode == 'upgrade-opencode')) && 'auto-upgrade'
      || ((github.event_name == 'schedule' && github.event.schedule == '47 17 * * *') || (github.event_name == 'workflow_dispatch' && inputs.mode == 'upgrade-canvas')) && 'auto-upgrade-canvas'
      || format('release-{0}', github.ref)
    }}
  # 仅发布链路取消进行中的旧 run（升级链路 cancel-in-progress=false，绝不打断进行中的基线推进）。
  cancel-in-progress: ${{ github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.mode == 'release') }}

permissions:
  contents: write

jobs:
  # ── upgrade-opencode：每日升级 opencode 上游基线（原 auto-upgrade.yml）────────
  #
  # 设计（对齐 brand/ 补丁叠加层架构）：
  #   - submodule 永远锁在「干净的上游 tag」，定制全在 brand/patches/*.patch；
  #   - 「升级」= 把基线 tag 推进到上游最新稳定 tag，并验证所有补丁仍能干净重放。
  #
  # 为什么用 PAT 推送：GitHub 默认 GITHUB_TOKEN 推 main/tag 不会触发其它 workflow（防无限循环），
  # 而升级后需要打的 dokng tag 触发本 workflow 的发布段，故用 RELEASE_PAT（repo 权限）推送。
  upgrade-opencode:
    if: >-
      (github.event_name == 'schedule' && github.event.schedule == '23 16 * * *') ||
      (github.event_name == 'workflow_dispatch' && inputs.mode == 'upgrade-opencode')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout（含 submodule；用 PAT 以便推送能触发发布段）
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0
          # RELEASE_PAT：repo 权限的 PAT。用它 checkout，后续 git push 即带 PAT 凭据，
          # 推 dokng tag 才能触发本 workflow 的 push:tag 发布段（默认 GITHUB_TOKEN 不触发）。
          token: ${{ secrets.RELEASE_PAT }}

      - name: 检测上游最新稳定 tag
        id: detect
        run: |
          set -euo pipefail
          CURRENT="$(tr -d '[:space:]' < brand/BASE_TAG)"
          echo "当前基线 tag：$CURRENT"

          # 拉取 submodule 所有 tag（origin = anomalyco/opencode，已同步上游）。
          git -C opencode fetch --tags --quiet origin

          # 只认稳定版 tag vX.Y.Z（排除 -rc / pr-*/ beta 等），按语义版本取最大。
          LATEST="$(git -C opencode tag -l 'v*' \
            | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' \
            | sort -V | tail -1)"
          echo "上游最新稳定 tag：${LATEST:-<无>}"

          if [ -z "$LATEST" ]; then
            echo "未找到任何稳定 tag，异常退出。" >&2
            exit 1
          fi

          # 降级保护：只有当 LATEST 严格新于 CURRENT 时才升级。
          NEWEST="$(printf '%s\n%s\n' "$CURRENT" "$LATEST" | sort -V | tail -1)"
          if [ "$LATEST" != "$CURRENT" ] && [ "$NEWEST" = "$LATEST" ]; then
            echo "发现新版本：$CURRENT → $LATEST"
            echo "need=true" >> "$GITHUB_OUTPUT"
            echo "latest=$LATEST" >> "$GITHUB_OUTPUT"
          else
            echo "已是最新（或当前基线更新），无需升级。"
            echo "need=false" >> "$GITHUB_OUTPUT"
          fi

      - name: 安装 Bun
        if: steps.detect.outputs.need == 'true'
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: opencode/package.json

      - name: 切到新 tag 并按 NN 序重放补丁（strict apply）
        if: steps.detect.outputs.need == 'true'
        env:
          LATEST: ${{ steps.detect.outputs.latest }}
        run: |
          set -euo pipefail
          # 干净 checkout 到新 tag（detached）；清掉任何残留，确保基线纯净。
          git -C opencode checkout --quiet "$LATEST"
          git -C opencode reset --hard --quiet
          git -C opencode clean -fdq

          # 在改动 submodule 前先做纯格式/manifest 预检；corrupt patch 必须零副作用提前失败。
          scripts/apply-patches.sh --preflight

          # 用统一的重放脚本（strict apply）落地补丁——与发布段 package 同一来源，避免逻辑漂移。
          # 此刻 brand/BASE_SHA 还是旧基线（升级成功后才刷新），脚本会 warn HEAD≠BASE_SHA，
          # 但不致命：apply 模式只要求 opencode/ 工作区干净 + 补丁精确适用；任一补丁失败即非 0
          # → 步骤失败 → 通知维护者手动介入。
          echo "按 NN 序重放补丁到 ${LATEST}："
          if scripts/apply-patches.sh; then
            echo "全部补丁 apply 成功。"
          else
            # strict 失败：上游 $LATEST 很可能改到了补丁热点文件（router/layout/server/vite 等）。
            # 直接在当前 $LATEST 工作区逐补丁 3way 试应用，把冲突 hunk 落成 .rej 打印出来——
            # 这诊断基于正确的新基线（BASE_SHA 此刻还是旧的，用 --check-3way 会基于旧基线不准），
            # 让维护者一眼看到哪个补丁的哪些 hunk 撞上了上游改动，缩短 rebase 定位时间。
            echo "::group::strict apply 失败——3way 漂移诊断（基于新基线 ${LATEST}）" >&2
            git -C opencode reset --hard --quiet
            git -C opencode clean -fdq
            for p in brand/patches/*.patch; do
              [ -e "$p" ] || continue
              name="$(basename "$p")"
              if git -C opencode apply --3way "$PWD/$p" >/dev/null 2>&1; then
                echo "  3way OK   $name" >&2
              else
                echo "  3way 冲突 ${name}：" >&2
                git -C opencode apply --3way --reject "$PWD/$p" 2>&1 | sed 's/^/      /' >&2 || true
                find opencode -name '*.rej' -print 2>/dev/null | sed 's/^/      rej: /' >&2 || true
              fi
            done
            git -C opencode reset --hard --quiet; git -C opencode clean -fdq
            echo "::endgroup::" >&2
            echo "补丁 strict apply 失败，需人工把补丁 rebase 到 ${LATEST}（见上方 3way 诊断）。" >&2
            exit 1
          fi

      - name: 安装依赖 + typecheck（app + desktop）
        if: steps.detect.outputs.need == 'true'
        working-directory: opencode
        run: |
          set -euo pipefail
          # [dokng] bun install 加重试：npm registry 偶发单包 tarball 下载失败（CI 曾遇
          # @esbuild/darwin-x64 这类平台可选依赖抽风），一次失败即中断。重试 3 次、间隔递增
          # （15s/30s）消除瞬时网络抖动；三次仍失败才真正报错（set -e 下走 exit 1）。
          for attempt in 1 2 3; do
            bun install && break
            if [ "$attempt" = 3 ]; then
              echo "bun install 连续 3 次失败，放弃。" >&2
              exit 1
            fi
            echo "bun install 第 $attempt 次失败，$((attempt * 15))s 后重试…" >&2
            sleep $((attempt * 15))
          done
          # 只 typecheck 定制涉及的两个包，快速验证补丁应用后类型仍自洽。
          bun turbo typecheck --filter=@opencode-ai/app --filter=@opencode-ai/desktop

      - name: 校验通过 → 更新基线、提交并推送 main + 打 dokng tag
        if: steps.detect.outputs.need == 'true'
        env:
          LATEST: ${{ steps.detect.outputs.latest }}
        run: |
          set -euo pipefail
          # 恢复 submodule 干净：撤销临时 apply 的补丁，gitlink 记录的是干净 tag 的 HEAD。
          git -C opencode reset --hard --quiet
          git -C opencode clean -fdq

          NEWSHA="$(git -C opencode rev-parse HEAD)"
          echo "新基线：${LATEST}（${NEWSHA}）"

          # 更新基线双文件（保留尾换行，与既有格式一致）。
          printf '%s\n' "$LATEST" > brand/BASE_TAG
          printf '%s\n' "$NEWSHA" > brand/BASE_SHA

          git add brand/BASE_TAG brand/BASE_SHA opencode
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "chore(opencode): 自动升级基线到 ${LATEST}（每日自动）"

          # 推 main（保存基线推进）。GITHUB_TOKEN 推送不会触发其它 workflow，
          # 故用 PAT checkout 后的凭据推送；真正触发出包的是下方推送的 dokng tag。
          # 加 pull --rebase + 重试：定时任务与手动触发 / 维护者推送可能并发，
          # 裸 push 遇 non-fast-forward 会被拒。重试 3 次，每次先 rebase 再推。
          pushed=false
          for attempt in 1 2 3; do
            if git push origin HEAD:main; then
              pushed=true
              break
            fi
            echo "push main 第 $attempt 次失败（可能 non-fast-forward），rebase 后重试…" >&2
            git fetch origin main --quiet || true
            # rebase 到最新 origin/main；基线文件冲突极少（只有并发升级才可能），
            # 冲突时放弃自动 rebase，让 job 失败等人工介入（不强推、不覆盖他人提交）。
            git rebase origin/main || { git rebase --abort || true; break; }
          done
          [ "$pushed" = true ] || { echo "push main 连续 3 次失败，放弃（无污染，可重跑）。" >&2; exit 1; }
          echo "已推送 main。"

          # 计算下一个 dokng 版本 tag（vX.Y.Z-dokng.N，基于新基线 BASE_TAG），打 tag 并推送。
          # 本 workflow 的 push:tags v* 触发器会据此起新 run 走发布段（复用现有版本号规则）。
          git fetch --tags --quiet origin || true
          # next-dokng-version.sh 的 stdout 只打「纯 tag 值」一行（KEY=VALUE 只进
          # GITHUB_OUTPUT），故 $() 直接拿到干净 tag，无需再 sed 抽取。
          NEWTAG="$(scripts/next-dokng-version.sh)"
          [ -n "$NEWTAG" ] || { echo "计算 dokng tag 失败（输出为空）。" >&2; exit 1; }
          echo "新 dokng 版本 tag：$NEWTAG"
          git tag "$NEWTAG"
          git push origin "$NEWTAG"
          echo "已推送 tag ${NEWTAG}，本 workflow 的 push:tag 发布段将据此自动出包。"

  # ── upgrade-canvas：每日升级 infinite-canvas 上游基线（原 auto-upgrade-canvas.yml）──
  #
  # 与 opencode 升级的关键差异：
  #   - 画布不独立发版：它内嵌进 opencode desktop 构建（out/renderer/canvas/）。故本 job 只
  #     「推进基线 + 推 main」，**不打 dokng tag、不触发发布段**——画布的变更会搭下一次 opencode
  #     升级或手动发布的车一起出包，避免 opencode 未变时空发版。
  #   - 验证步骤是画布 build（cd web && bun install && bun run build），非 typecheck。
  upgrade-canvas:
    if: >-
      (github.event_name == 'schedule' && github.event.schedule == '47 17 * * *') ||
      (github.event_name == 'workflow_dispatch' && inputs.mode == 'upgrade-canvas')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout（含 submodule；用 PAT 保持与 opencode 升级同款推送凭据）
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0
          # RELEASE_PAT：repo 权限 PAT，与 opencode 升级共用。画布升级只推 main、不打 tag，
          # 用 PAT 保持凭据一致性（后续 git push 带 PAT）。
          token: ${{ secrets.RELEASE_PAT }}

      - name: 检测上游最新稳定 tag
        id: detect
        run: |
          set -euo pipefail
          CURRENT="$(tr -d '[:space:]' < brand/CANVAS_BASE_TAG)"
          echo "当前画布基线 tag：$CURRENT"

          # 拉取 submodule 所有 tag（origin = basketikun/infinite-canvas）。
          git -C infinite-canvas fetch --tags --quiet origin

          # 只认稳定版 tag vX.Y.Z。此正则天然排除上游历史里的脏 tag v.0.1.0（多一个点、非三段数字）。
          LATEST="$(git -C infinite-canvas tag -l 'v*' \
            | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' \
            | sort -V | tail -1)"
          echo "上游最新稳定 tag：${LATEST:-<无>}"

          if [ -z "$LATEST" ]; then
            echo "未找到任何稳定 tag，异常退出。" >&2
            exit 1
          fi

          # 降级保护：只有当 LATEST 严格新于 CURRENT 时才升级。
          NEWEST="$(printf '%s\n%s\n' "$CURRENT" "$LATEST" | sort -V | tail -1)"
          if [ "$LATEST" != "$CURRENT" ] && [ "$NEWEST" = "$LATEST" ]; then
            echo "发现新版本：$CURRENT → $LATEST"
            echo "need=true" >> "$GITHUB_OUTPUT"
            echo "latest=$LATEST" >> "$GITHUB_OUTPUT"
          else
            echo "已是最新（或当前基线更新），无需升级。"
            echo "need=false" >> "$GITHUB_OUTPUT"
          fi

      - name: 安装 Bun
        if: steps.detect.outputs.need == 'true'
        uses: oven-sh/setup-bun@v2
        with:
          # 锁定与发布构建同源的 bun 版本（opencode/package.json），
          # 避免「升级验证构建用某版本、正式发布用另一版本」的漂移导致「升级时通过、发布时挂」。
          bun-version-file: opencode/package.json

      - name: 切到新 tag 并按 NN 序重放画布补丁（strict apply）
        if: steps.detect.outputs.need == 'true'
        env:
          LATEST: ${{ steps.detect.outputs.latest }}
        run: |
          set -euo pipefail
          # 干净 checkout 到新 tag（detached）；清掉任何残留，确保基线纯净。
          git -C infinite-canvas checkout --quiet "$LATEST"
          git -C infinite-canvas reset --hard --quiet
          git -C infinite-canvas clean -fdq

          # 在改动 submodule 前先做纯格式/manifest 预检；corrupt patch 必须零副作用提前失败。
          scripts/apply-canvas-patches.sh --preflight

          # 用统一的画布重放脚本（strict apply）落地补丁。此刻 CANVAS_BASE_SHA 还是旧基线，
          # 脚本会 warn HEAD≠BASE_SHA，但不致命：apply 模式只要求工作区干净 + 补丁精确适用；
          # 任一补丁失败即非 0 → 步骤失败 → 通知维护者手动介入（上游漂移需人工修补丁）。
          echo "按 NN 序重放画布补丁到 ${LATEST}："
          if ! scripts/apply-canvas-patches.sh; then
            echo "::error::画布补丁 strict apply 失败（上游 $LATEST 漂移）。以下为 3way 诊断，列出冲突 hunk：" >&2
            # strict 失败后工作区可能已落地部分补丁，先恢复干净再逐补丁 3way 试应用，
            # 定位真正冲突的 patch/hunk（.rej）。诊断基于正确的新基线（当前已 checkout 到 ${LATEST}）。
            git -C infinite-canvas reset --hard --quiet
            git -C infinite-canvas clean -fdq
            for p in $(find brand/canvas-patches -maxdepth 1 -name '*.patch' | LC_ALL=C sort); do
              if git -C infinite-canvas apply --3way --whitespace=nowarn "$PWD/$p" 2>/dev/null; then
                echo "  3way OK   $(basename "$p")" >&2
              else
                echo "  3way 冲突 $(basename "$p")：" >&2
                git -C infinite-canvas apply --3way "$PWD/$p" 2>&1 | sed 's/^/          /' >&2 || true
              fi
            done
            echo "::error::请本地 rebase 画布补丁到 ${LATEST}（检查点 worktree + export-patch.sh 重导出），再更新 CANVAS_BASE_SHA/TAG。" >&2
            exit 1
          fi
          echo "全部画布补丁 apply 成功。"

      - name: 安装依赖 + 构建画布（VITE_BASE=/canvas/，与 desktop 打包一致）
        if: steps.detect.outputs.need == 'true'
        working-directory: infinite-canvas/web
        env:
          # 与 desktop 的 build-canvas.ts 完全一致——验证的就是实际内嵌产物的构建路径。
          VITE_BASE: /canvas/
        run: |
          set -euo pipefail
          # bun install 加重试：npm registry 偶发单包 tarball 下载失败，重试 3 次消抖动
          # （与 opencode 升级同款策略）。
          for attempt in 1 2 3; do
            bun install && break
            if [ "$attempt" = 3 ]; then
              echo "bun install 连续 3 次失败，放弃。" >&2
              exit 1
            fi
            echo "bun install 第 $attempt 次失败，$((attempt * 15))s 后重试…" >&2
            sleep $((attempt * 15))
          done
          # 构建画布产物：验证补丁应用后画布仍能干净构建（依赖仓库根的 VERSION / CHANGELOG.md，
          # vite.config.ts readFileSync 无 try/catch，缺文件即构建失败——submodule 完整则天然在位）。
          bun run build

      - name: 校验通过 → 更新基线、提交并推送 main（不打 tag）
        if: steps.detect.outputs.need == 'true'
        env:
          LATEST: ${{ steps.detect.outputs.latest }}
        run: |
          set -euo pipefail
          # 恢复 submodule 干净：撤销临时 apply 的补丁 + build 产物，gitlink 记录干净 tag 的 HEAD。
          git -C infinite-canvas reset --hard --quiet
          git -C infinite-canvas clean -fdq

          NEWSHA="$(git -C infinite-canvas rev-parse HEAD)"
          echo "新画布基线：${LATEST}（${NEWSHA}）"

          # 更新基线双文件（保留尾换行，与既有格式一致）。
          printf '%s\n' "$LATEST" > brand/CANVAS_BASE_TAG
          printf '%s\n' "$NEWSHA" > brand/CANVAS_BASE_SHA

          git add brand/CANVAS_BASE_TAG brand/CANVAS_BASE_SHA infinite-canvas
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "chore(canvas): 自动升级画布基线到 ${LATEST}（每日自动）"

          # 只推 main 保存基线推进；**不打 dokng tag**——画布不独立发版，其变更搭下次
          # opencode 升级 / 手动发布的车出包（见 job 头说明）。
          # 加 pull --rebase + 重试：canvas 与 opencode 两条升级错开约 84 分钟，正常不撞；
          # 但手动触发 / 维护者推送可能并发，裸 push 遇 non-fast-forward 会被拒。
          pushed=false
          for attempt in 1 2 3; do
            if git push origin HEAD:main; then
              pushed=true
              break
            fi
            echo "push main 第 $attempt 次失败（可能 non-fast-forward），rebase 后重试…" >&2
            git fetch origin main --quiet || true
            git rebase origin/main || { git rebase --abort || true; break; }
          done
          [ "$pushed" = true ] || { echo "push main 连续 3 次失败，放弃（无污染，可重跑）。" >&2; exit 1; }
          echo "已推送 main（画布基线 → ${LATEST}）。未打 tag：画布随下次 opencode 发版一起出包。"

  # ── detect：计算版本号、判断是否发布、登记敏感值日志掩码 ──────────────
  detect:
    if: >-
      github.event_name == 'push' ||
      (github.event_name == 'workflow_dispatch' && inputs.mode == 'release')
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.calc.outputs.version }}
      tag: ${{ steps.calc.outputs.tag }}
      should_release: ${{ steps.decide.outputs.should_release }}
    steps:
      - name: Checkout（仅父仓库，不需要 submodule）
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 登记敏感值为日志掩码：一旦后续任何步骤误打印，日志里显示为 ***。
      # 这些值来自 Secret，本步骤只把「值」喂给 ::add-mask::，不 echo 出来。
      - name: 屏蔽渠道敏感值（::add-mask::）
        env:
          NEWAPI_BASE_URL: ${{ secrets.NEWAPI_BASE_URL }}
          NEWAPI_API_KEY: ${{ secrets.NEWAPI_API_KEY }}
          NEWAPI_MODEL: ${{ secrets.NEWAPI_MODEL }}
          NEWAPI_TOPUP_URL: ${{ secrets.NEWAPI_TOPUP_URL }}
        run: |
          # 对每个非空 Secret 调 ::add-mask::。用 printf 经变量传值，绝不把明文写进命令行。
          mask() { [ -n "$1" ] && echo "::add-mask::$1" || true; }
          mask "$NEWAPI_BASE_URL"
          mask "$NEWAPI_API_KEY"
          mask "$NEWAPI_MODEL"
          mask "$NEWAPI_TOPUP_URL"
          echo "已登记渠道敏感值日志掩码（值不回显）。"

      - name: 计算下一个 dokng 发布版本号
        id: calc
        env:
          # 覆盖版本（workflow_dispatch 手填）优先；否则脚本按 BASE_TAG + 已有 release 计算。
          FORCE_VERSION: ${{ inputs.force_version }}
          GH_TOKEN: ${{ github.token }}
        run: |
          BASE_TAG="$(tr -d '[:space:]' < brand/BASE_TAG)"
          echo "基线 opencode tag：$BASE_TAG"

          if [ -n "$FORCE_VERSION" ]; then
            echo "使用强制指定版本：$FORCE_VERSION"
            echo "version=$FORCE_VERSION" >> "$GITHUB_OUTPUT"
            echo "tag=$FORCE_VERSION" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # push tag 触发时，直接用推上来的 tag 作为版本号。
          if [ "${GITHUB_REF_TYPE:-}" = "tag" ]; then
            echo "由 tag 触发，版本号取当前 tag：$GITHUB_REF_NAME"
            echo "version=$GITHUB_REF_NAME" >> "$GITHUB_OUTPUT"
            echo "tag=$GITHUB_REF_NAME" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # 查已有 dokng release，交给脚本算 N+1。gh 不可用时降级为空（脚本从 dokng.1 起）。
          EXISTING="$(gh release list --limit 200 --json tagName --jq '.[].tagName' 2>/dev/null || true)"
          export EXISTING_TAGS="$EXISTING"
          bash scripts/next-dokng-version.sh --base "$BASE_TAG"

      - name: 判断是否需要发布
        id: decide
        env:
          FORCE_RELEASE: ${{ inputs.force_release }}
          TAG: ${{ steps.calc.outputs.tag }}
          GH_TOKEN: ${{ github.token }}
        run: |
          # push tag 或手动 force_release → 一定发布。
          if [ "${GITHUB_REF_TYPE:-}" = "tag" ] || [ "$FORCE_RELEASE" = "true" ]; then
            echo "should_release=true" >> "$GITHUB_OUTPUT"
            echo "触发发布：tag 触发或 force_release。"
            exit 0
          fi
          # 否则：目标 tag 已存在则跳过（幂等），不存在则发布。
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            echo "版本 $TAG 已发布，跳过。"
          else
            echo "should_release=true" >> "$GITHUB_OUTPUT"
            echo "版本 $TAG 尚未发布，将发布。"
          fi

  # ── package：四平台各出安装包（矩阵对齐验收标准 #4）────────────────
  package:
    needs: detect
    if: needs.detect.outputs.should_release == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          # 四平台矩阵：macOS arm64 + macOS x64 + Windows x64 + Linux x64。
          # .dmg + .zip（Apple Silicon）：arm64 runner 原生编译，装 arm64 的 node-pty。
          # dmg 供人工下载，zip 供 electron-updater 自更新（macOS 只能用 zip 更新）。
          # meta_subdir 对齐 finalize-latest-yml.ts 期望的子目录名（合并 mac 双架构 latest-mac.yml）。
          - os: macos-latest
            platform_flag: "--mac"
            arch_flag: "--arm64"
            artifact_glob: |
              opencode/packages/desktop/dist/*.dmg
              opencode/packages/desktop/dist/*.zip
            artifact_name: dokng-dmg-arm64
            meta_subdir: latest-yml-aarch64-apple-darwin
          # .dmg + .zip（Intel）：x64 runner 原生编译，装 x64 的 node-pty。
          # 关键：node-pty 是按平台拆分的独立子包（@lydell/node-pty-darwin-<arch>），
          # 靠 optionalDependencies 只装当前 runner 架构那一个。故 x64 包必须在 x64
          # runner 上编，不能在 arm64 runner 上跨架构出 x64（会塞进 arm64 的 pty.node，
          # 运行时报 Cannot find ./prebuilds/darwin-x64/pty.node）。
          - os: macos-15-intel
            platform_flag: "--mac"
            arch_flag: "--x64"
            artifact_glob: |
              opencode/packages/desktop/dist/*.dmg
              opencode/packages/desktop/dist/*.zip
            artifact_name: dokng-dmg-x64
            meta_subdir: latest-yml-x86_64-apple-darwin
          # .exe 用 windows runner
          - os: windows-latest
            platform_flag: "--win"
            arch_flag: ""
            artifact_glob: "opencode/packages/desktop/dist/*.exe"
            artifact_name: dokng-exe
            meta_subdir: latest-yml-x86_64-pc-windows-msvc
          # .AppImage 用 linux runner
          - os: ubuntu-latest
            platform_flag: "--linux"
            arch_flag: ""
            artifact_glob: "opencode/packages/desktop/dist/*.AppImage"
            artifact_name: dokng-appimage
            meta_subdir: latest-yml-x86_64-unknown-linux-gnu
    runs-on: ${{ matrix.os }}
    env:
      # 无签名凭据时降级出未签名包（验收只要求出包，不要求签名）。
      CX_UNSIGNED: "1"
      # 上游 electron-builder 配置按 prod 通道出品牌 appId / 无后缀名。
      OPENCODE_CHANNEL: prod
      # 渠道值经 Secret 注入为环境变量（构建期由 electron.vite renderer.define
      # 内联进 renderer bundle，供余额面板读取；绝不进 git / 不进日志）。
      NEWAPI_BASE_URL: ${{ secrets.NEWAPI_BASE_URL }}
      NEWAPI_API_KEY: ${{ secrets.NEWAPI_API_KEY }}
      NEWAPI_MODEL: ${{ secrets.NEWAPI_MODEL }}
      NEWAPI_TOPUP_URL: ${{ secrets.NEWAPI_TOPUP_URL }}
    steps:
      - name: Checkout（含 opencode submodule）
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: 屏蔽渠道敏感值（::add-mask::）
        shell: bash
        run: |
          mask() { [ -n "$1" ] && echo "::add-mask::$1" || true; }
          mask "$NEWAPI_BASE_URL"
          mask "$NEWAPI_API_KEY"
          mask "$NEWAPI_MODEL"
          mask "$NEWAPI_TOPUP_URL"

      - name: 校验 submodule gitlink 与 BASE_SHA 一致
        shell: bash
        run: |
          set -euo pipefail
          # [dokng] 关键不变式：release 构建 checkout 的是父仓库 gitlink 记录的 submodule commit，
          # 而补丁是针对 BASE_SHA 验证的。二者必须一致，否则会在「未经补丁验证的 commit」上出包
          # （gitlink 与 BASE_SHA 漂移的成因：手工提交失误、只改 BASE_SHA 没更 gitlink、rebase 解错）。
          # 升级正常路径会原子更新三者保持一致；此处硬校验兜底，不一致即中断发布。
          check_pin() {
            local name="$1" dir="$2" file="$3" head base
            head="$(git -C "$dir" rev-parse HEAD)"
            base="$(tr -d '[:space:]' < "$file")"
            if [ "$head" != "$base" ]; then
              echo "::error::$name gitlink ($head) 与 $file ($base) 不一致——拒绝在未验证基线上出包。" >&2
              exit 1
            fi
            echo "$name gitlink == ${file}：$head"
          }
          check_pin opencode opencode brand/BASE_SHA
          check_pin infinite-canvas infinite-canvas brand/CANVAS_BASE_SHA

      - name: 预检补丁语法与清单
        shell: bash
        run: |
          # 不创建 worktree、不修改 submodule：先拦截 corrupt patch / CRLF / manifest 漂移，
          # 避免矩阵构建在落地前序补丁后才于后序 patch 失败。
          scripts/apply-patches.sh --preflight
          scripts/apply-canvas-patches.sh --preflight

      - name: 重放 brand 补丁到 opencode/
        shell: bash
        run: |
          # 单一来源：调用 scripts/apply-patches.sh（apply 模式 = strict git apply，
          # 按 NN 序累积落地到 opencode/ 工作区）。补丁重放逻辑只此一份，
          # 升级 job 与本地维护者共用同脚本，避免多处内联漂移。
          scripts/apply-patches.sh

      - name: 重放画布补丁到 infinite-canvas/
        shell: bash
        run: |
          # [dokng] 画布（第二上游）补丁重放：给 infinite-canvas/ 工作区落地 basename /
          # postMessage 注入 / persist 不落盘（brand/canvas-patches/）。desktop 构建时 prebuild
          # 的 build-canvas.ts 会以 VITE_BASE=/canvas/ 构建画布、拷进 out/renderer/canvas/；
          # 若此步不跑，正式包内嵌的画布是未打补丁版（iframe 404 + 收不到宿主 key）。
          scripts/apply-canvas-patches.sh

      - name: 安装 Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: opencode/package.json

      - name: 安装 rpm 工具（linux，deb/rpm 依赖，出 AppImage 亦更稳）
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends rpm

      - name: 安装依赖
        working-directory: opencode
        shell: bash
        run: |
          # Windows 上用 hoisted linker（对齐上游 setup-bun action 的 workaround）。
          install_flags=""
          if [ "$RUNNER_OS" = "Windows" ]; then
            install_flags="--linker hoisted"
          fi
          # [dokng] bun install 加重试：npm registry 偶发单包 tarball 下载失败（CI 曾遇
          # @esbuild/darwin-x64 这类平台可选依赖抽风），一次失败即中断整个发布。重试 3 次、
          # 间隔递增（15s/30s）消除瞬时网络抖动；三次仍失败才真正报错。
          for attempt in 1 2 3; do
            bun install $install_flags && break
            if [ "$attempt" = 3 ]; then
              echo "bun install 连续 3 次失败，放弃。" >&2
              exit 1
            fi
            echo "bun install 第 $attempt 次失败，$((attempt * 15))s 后重试…" >&2
            sleep $((attempt * 15))
          done

      - name: 注入 dokng 版本号到 package.json
        working-directory: opencode/packages/desktop
        shell: bash
        run: |
          # electron-builder 用 package.json 的 version 作为产物版本，并写进 latest*.yml。
          # 硬编码的 1.17.15 会让所有产物版本一致、自更新永远「已是最新」。故用 detect 算出的
          # dokng 版本号覆盖（剥掉前导 v，semver version 不能带 v）。npm 随 npx 可用。
          VER="${{ needs.detect.outputs.version }}"
          npm pkg set version="${VER#v}"
          echo "package.json version = $(npm pkg get version)"

      - name: 构建 desktop（bun run build）
        working-directory: opencode/packages/desktop
        env:
          NODE_OPTIONS: --max-old-space-size=4096
          OPENCODE_VERSION: ${{ needs.detect.outputs.version }}
        run: bun run build

      - name: 打包（electron-builder + brand 配置）
        working-directory: opencode/packages/desktop
        timeout-minutes: 60
        shell: bash
        run: |
          # 用品牌覆盖配置出包。--publish never：只出产物，发布交给 release job。
          # 配置路径相对 desktop 目录回溯到仓库根的 brand/。
          npx electron-builder ${{ matrix.platform_flag }} ${{ matrix.arch_flag }} --publish never \
            --config ../../../brand/electron-builder.brand.ts

      - name: 上传安装包产物
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_glob }}
          if-no-files-found: error

      # [cx] 上传自更新元数据（latest*.yml + blockmap），按架构分子目录命名，供 release job
      # 合并（finalize-latest-yml.ts 按 meta_subdir 名读取，合并 mac 双架构 latest-mac.yml）。
      # 不 merge——各架构独立 artifact，避免同名 latest-mac.yml 互相覆盖。
      - name: 上传更新元数据（latest*.yml）
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.meta_subdir }}
          path: |
            opencode/packages/desktop/dist/*.yml
            opencode/packages/desktop/dist/*.blockmap
          if-no-files-found: warn

  # ── release：汇总产物，创建 / 更新 GitHub Release ────────────────
  release:
    needs:
      - detect
      - package
    if: needs.detect.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout（含 submodule，需 finalize-latest-yml.ts）
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: 安装 Bun（跑 finalize-latest-yml.ts）
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: opencode/package.json

      - name: 下载安装包产物（dmg/zip/exe/AppImage）
        uses: actions/download-artifact@v4
        with:
          path: /tmp/artifacts
          pattern: dokng-*
          merge-multiple: true

      - name: 下载更新元数据（latest*.yml，各架构分子目录、不合并）
        uses: actions/download-artifact@v4
        with:
          path: /tmp/latest-yml
          pattern: latest-yml-*

      - name: 列出待发布产物
        run: |
          echo "安装包产物："; ls -la /tmp/artifacts || true
          echo "更新元数据目录："; ls -R /tmp/latest-yml || true

      - name: 创建 / 更新 GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.detect.outputs.tag }}
        run: |
          BASE_TAG="$(tr -d '[:space:]' < brand/BASE_TAG)"
          NOTES="基于 opencode $BASE_TAG 的 dokng 定制发布（${TAG}）。三平台安装包：.dmg / .exe / .AppImage。"
          # blockmap 供 electron-updater 差量更新；一并上传（缺失则全量下载，非阻断）。
          find /tmp/latest-yml -name '*.blockmap' -exec cp {} /tmp/artifacts/ \; 2>/dev/null || true
          # --latest：始终标记为最新（tag 带 -dokng.N 会被 GitHub 判为 prerelease、默认不标 Latest；
          # 显式 --latest 让 release 页面正常显示，无需手动点）。
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "release $TAG 已存在，覆盖上传产物。"
            gh release upload "$TAG" /tmp/artifacts/* --clobber
            gh release edit "$TAG" --latest
          else
            echo "创建 release ${TAG}。"
            gh release create "$TAG" \
              --title "$TAG" \
              --notes "$NOTES" \
              --target "$GITHUB_SHA" \
              --latest \
              /tmp/artifacts/*
          fi

      - name: 合并并上传更新元数据 latest*.yml
        env:
          GH_TOKEN: ${{ github.token }}
          LATEST_YML_DIR: /tmp/latest-yml
          GH_REPO: ${{ github.repository }}
          OPENCODE_VERSION: ${{ needs.detect.outputs.version }}
        run: |
          # finalize-latest-yml.ts：把 mac 双架构 latest-mac.yml 合并成单个（含两架构 files），
          # win/linux 透传，再 gh release upload 到当前 tag（脚本内用 v${OPENCODE_VERSION} 拼 tag）。
          # 脚本把合并后的 yml 写到 ${RUNNER_TEMP}（供下一步 R2 双写取用），同时上传到 GitHub Release。
          # OPENCODE_VERSION 需不带 v；detect 输出带 v，这里剥掉。
          export OPENCODE_VERSION="${OPENCODE_VERSION#v}"
          bun opencode/packages/desktop/scripts/finalize-latest-yml.ts

      # [cx] R2 双写：安装包 + blockmap 推到 open-code/<version>/，合并后的 latest*.yml 推到
      # open-code/ 根，作为 electron-updater 的主更新源（GitHub Release 保留为存档 / 回退源）。
      # 布局与 cc-switch 同构（元数据在产品根固定 URL，安装包下沉版本子目录）。
      # 守卫：未配置 R2 Secret 时整步跳过，不阻断 GitHub 发布（渐进启用）。
      # 用 aws s3 CLI（ubuntu runner 自带，R2 兼容 S3 API），endpoint 指向 R2。
      - name: 双写产物到 Cloudflare R2（open-code/ 目录）
        if: env.R2_ACCESS_KEY_ID != ''
        env:
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          # aws CLI 走 R2 的 S3 兼容凭据（与 R2_* 同源，避免污染其他步骤的 AWS 环境）。
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
          RUNNER_TEMP: ${{ runner.temp }}
          OPENCODE_VERSION: ${{ needs.detect.outputs.version }}
        run: |
          set -euo pipefail
          # 敏感值登记日志掩码，防误打印。
          for v in "$R2_ACCOUNT_ID" "$R2_ACCESS_KEY_ID" "$R2_SECRET_ACCESS_KEY" "$R2_BUCKET"; do
            [ -n "$v" ] && echo "::add-mask::$v" || true
          done

          endpoint="https://${R2_ACCOUNT_ID}.r2.cloudflarestorage.com"
          # 版本子目录名：去掉 v 前缀的完整版本号，形如 1.17.15-dokng.3（与安装包文件名内的
          # 版本 token、finalize-latest-yml.ts 写进 yml 的 url 前缀一致）。
          VERSION="${OPENCODE_VERSION#v}"

          # [dokng] R2 布局（与 cc-switch 同构）：
          #   open-code/                       ← 产品根，updater 固定 URL 轮询
          #     ├── latest*.yml                ← 更新元数据，每版覆盖 → 禁缓存
          #     └── <version>/                 ← 安装包 + blockmap，URL 每版唯一 → immutable 长缓存
          #         └── *.exe / *.dmg / *.zip / *.AppImage / *.blockmap
          # 两类内容分开上传，套不同 cache-control。

          # staging-pkg：安装包 + blockmap（release 步骤已 cp 到 /tmp/artifacts）→ 版本子目录。
          mkdir -p /tmp/r2-pkg
          cp -f /tmp/artifacts/* /tmp/r2-pkg/ 2>/dev/null || true
          # staging-meta：合并后的 latest*.yml（finalize 步骤写到 ${RUNNER_TEMP}），确保是含双架构
          # files 的合并单文件，而非各架构分片 → 产品根。
          mkdir -p /tmp/r2-meta
          for y in latest.yml latest-mac.yml latest-linux.yml latest-linux-arm64.yml; do
            [ -f "$RUNNER_TEMP/$y" ] && cp -f "$RUNNER_TEMP/$y" /tmp/r2-meta/ || true
          done

          echo "待上传到 R2 open-code/${VERSION}/ 的安装包："; ls -la /tmp/r2-pkg
          echo "待上传到 R2 open-code/ 的元数据："; ls -la /tmp/r2-meta

          # --checksum-algorithm CRC32：规避 R2 对 S3 默认分块校验（CRC64NVME）的兼容问题。
          # 安装包/blockmap 文件名带版本号（URL 每版唯一）→ 长缓存 immutable，CDN 尽量命中。
          aws s3 cp /tmp/r2-pkg/ "s3://${R2_BUCKET}/open-code/${VERSION}/" \
            --recursive \
            --endpoint-url "$endpoint" \
            --checksum-algorithm CRC32 \
            --cache-control "public,max-age=31536000,immutable"
          # latest*.yml 是固定 URL、每版覆盖 → 必须禁缓存，否则 Cloudflare CDN 会缓存住旧 yml，
          # 客户端拉不到新版本、自更新延迟数小时。逐个上传并显式 text/yaml + no-cache。
          for y in /tmp/r2-meta/*; do
            [ -f "$y" ] || continue
            aws s3 cp "$y" "s3://${R2_BUCKET}/open-code/$(basename "$y")" \
              --endpoint-url "$endpoint" \
              --checksum-algorithm CRC32 \
              --content-type "text/yaml" \
              --cache-control "no-cache,max-age=0,must-revalidate"
          done
          echo "R2 双写完成：s3://${R2_BUCKET}/open-code/（latest*.yml 禁缓存，安装包 immutable）"

          # [dokng] 保留最近 3 个版本：安装包现按 open-code/<version>/ 分目录存放，key 形如
          # open-code/1.17.15-dokng.N/xxx。做法：列出 open-code/ 下全部对象 → 抽版本 token →
          # sort -V 取最新 3 个为保留集 → 逐 key 精确比对（grep -qxF 整行匹配，避免 dokng.2
          # 误伤 dokng.20），版本不在保留集的对象删除；无版本 token 的对象（根下 latest*.yml）永远保留。
          KEEP_VERSIONS=3
          mapfile -t all_keys < <(
            aws s3 ls "s3://${R2_BUCKET}/open-code/" --recursive --endpoint-url "$endpoint" \
              | awk '{print $4}' | grep -v '^$' || true
          )
          if [ "${#all_keys[@]}" -gt 0 ]; then
            versions="$(printf '%s\n' "${all_keys[@]}" \
              | grep -oE '[0-9]+\.[0-9]+\.[0-9]+-dokng\.[0-9]+' | sort -V -u || true)"
            total="$(printf '%s\n' "$versions" | grep -c . || true)"
            keep="$(printf '%s\n' "$versions" | tail -n "$KEEP_VERSIONS")"
            echo "R2 现有版本共 ${total} 个，保留最新 ${KEEP_VERSIONS} 个："
            printf '  keep: %s\n' $keep
            if [ "${total:-0}" -gt "$KEEP_VERSIONS" ]; then
              for key in "${all_keys[@]}"; do
                v="$(printf '%s' "$key" | grep -oE '[0-9]+\.[0-9]+\.[0-9]+-dokng\.[0-9]+' | head -1 || true)"
                # 无版本 token（根下 latest*.yml 等）→ 永远保留。
                [ -n "$v" ] || continue
                if ! printf '%s\n' "$keep" | grep -qxF "$v"; then
                  echo "  清理旧版本对象：$key"
                  aws s3 rm "s3://${R2_BUCKET}/${key}" --endpoint-url "$endpoint" || true
                fi
              done
            else
              echo "版本数未超过保留上限，无需清理。"
            fi
          fi
          echo "R2 版本清理完成。"
