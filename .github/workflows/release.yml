name: release

# US-009 —— CI：检测 / 构建 / 打包 / 发布
#
# 流程（四段 job，依赖串联）：
#   detect  —— 计算下一个 cx 发布版本号 <opencode版本>-cx.N（读 brand/BASE_TAG +
#              已有 GitHub Release），判断是否需要发布；渠道 Secret 经 ::add-mask:: 屏蔽。
#   build   —— 在各平台 runner 上 checkout（含 submodule）→ 重放 brand/patches →
#              bun install → bun run build（electron-vite 构建 renderer/main）。
#   package —— 用 brand/electron-builder.brand.ts 出安装包：
#                .dmg  → macOS runner（macos-latest）
#                .exe  → windows runner（windows-latest）
#                .AppImage → linux runner（ubuntu-latest）
#              渠道值经 env 注入（构建期内联进 renderer bundle，供余额面板用）。
#   release —— 汇总三平台产物，创建/更新 GitHub Release（tag = detect 算出的版本号）。
#
# 安全（验收标准 #3）：
#   - 渠道值 / 密钥全部经 GitHub Secret 注入为环境变量，仓库与工作流文件里不含明文；
#   - detect 段用 ::add-mask:: 把注入的敏感值登记为日志掩码，后续任何步骤误打印都显示为 ***；
#   - 这些值只在打包 job 的 env 里出现，绝不写入 git、不 echo 到日志。
#
# 触发：
#   - 手动 workflow_dispatch（可强制指定版本 / 强制发布）；
#   - push 到 main（推代码即自动打包发布，版本号 detect 段按已有 release 自增 -cx.N）；
#   - push tag v*-cx.*（维护者打 tag 即触发发布）。
#
# 平台矩阵严格对齐验收标准 #4：
#   .dmg=macOS runner，.exe=windows runner，.AppImage=linux runner。

on:
  workflow_dispatch:
    inputs:
      force_version:
        description: "强制指定发布版本号（如 v1.17.15-cx.3）；留空则自动计算"
        required: false
        type: string
      force_release:
        description: "即使无新版本也强制走发布"
        required: false
        type: boolean
        default: false
  push:
    branches:
      - main
    tags:
      - "v*-cx.*"

# 同一 ref 只跑一个发布流水线，新推送取消旧的。
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  # ── detect：计算版本号、判断是否发布、登记敏感值日志掩码 ──────────────
  detect:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.calc.outputs.version }}
      tag: ${{ steps.calc.outputs.tag }}
      should_release: ${{ steps.decide.outputs.should_release }}
    steps:
      - name: Checkout（仅父仓库，不需要 submodule）
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 登记敏感值为日志掩码：一旦后续任何步骤误打印，日志里显示为 ***。
      # 这些值来自 Secret，本步骤只把「值」喂给 ::add-mask::，不 echo 出来。
      - name: 屏蔽渠道敏感值（::add-mask::）
        env:
          NEWAPI_BASE_URL: ${{ secrets.NEWAPI_BASE_URL }}
          NEWAPI_API_KEY: ${{ secrets.NEWAPI_API_KEY }}
          NEWAPI_MODEL: ${{ secrets.NEWAPI_MODEL }}
          NEWAPI_TOPUP_URL: ${{ secrets.NEWAPI_TOPUP_URL }}
        run: |
          # 对每个非空 Secret 调 ::add-mask::。用 printf 经变量传值，绝不把明文写进命令行。
          mask() { [ -n "$1" ] && echo "::add-mask::$1" || true; }
          mask "$NEWAPI_BASE_URL"
          mask "$NEWAPI_API_KEY"
          mask "$NEWAPI_MODEL"
          mask "$NEWAPI_TOPUP_URL"
          echo "已登记渠道敏感值日志掩码（值不回显）。"

      - name: 计算下一个 cx 发布版本号
        id: calc
        env:
          # 覆盖版本（workflow_dispatch 手填）优先；否则脚本按 BASE_TAG + 已有 release 计算。
          FORCE_VERSION: ${{ inputs.force_version }}
          GH_TOKEN: ${{ github.token }}
        run: |
          BASE_TAG="$(tr -d '[:space:]' < brand/BASE_TAG)"
          echo "基线 opencode tag：$BASE_TAG"

          if [ -n "$FORCE_VERSION" ]; then
            echo "使用强制指定版本：$FORCE_VERSION"
            echo "version=$FORCE_VERSION" >> "$GITHUB_OUTPUT"
            echo "tag=$FORCE_VERSION" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # push tag 触发时，直接用推上来的 tag 作为版本号。
          if [ "${GITHUB_REF_TYPE:-}" = "tag" ]; then
            echo "由 tag 触发，版本号取当前 tag：$GITHUB_REF_NAME"
            echo "version=$GITHUB_REF_NAME" >> "$GITHUB_OUTPUT"
            echo "tag=$GITHUB_REF_NAME" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # 查已有 cx release，交给脚本算 N+1。gh 不可用时降级为空（脚本从 cx.1 起）。
          EXISTING="$(gh release list --limit 200 --json tagName --jq '.[].tagName' 2>/dev/null || true)"
          export EXISTING_TAGS="$EXISTING"
          bash scripts/next-cx-version.sh --base "$BASE_TAG"

      - name: 判断是否需要发布
        id: decide
        env:
          FORCE_RELEASE: ${{ inputs.force_release }}
          TAG: ${{ steps.calc.outputs.tag }}
          GH_TOKEN: ${{ github.token }}
        run: |
          # push tag 或手动 force_release → 一定发布。
          if [ "${GITHUB_REF_TYPE:-}" = "tag" ] || [ "$FORCE_RELEASE" = "true" ]; then
            echo "should_release=true" >> "$GITHUB_OUTPUT"
            echo "触发发布：tag 触发或 force_release。"
            exit 0
          fi
          # 否则：目标 tag 已存在则跳过（幂等），不存在则发布。
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            echo "版本 $TAG 已发布，跳过。"
          else
            echo "should_release=true" >> "$GITHUB_OUTPUT"
            echo "版本 $TAG 尚未发布，将发布。"
          fi

  # ── package：三平台各出一种安装包（矩阵对齐验收标准 #4）────────────────
  package:
    needs: detect
    if: needs.detect.outputs.should_release == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          # .dmg（Apple Silicon）：arm64 runner 原生编译，装 arm64 的 node-pty。
          - os: macos-latest
            platform_flag: "--mac"
            arch_flag: "--arm64"
            artifact_glob: "opencode/packages/desktop/dist/*.dmg"
            artifact_name: cx-dmg-arm64
          # .dmg（Intel）：x64 runner 原生编译，装 x64 的 node-pty。
          # 关键：node-pty 是按平台拆分的独立子包（@lydell/node-pty-darwin-<arch>），
          # 靠 optionalDependencies 只装当前 runner 架构那一个。故 x64 包必须在 x64
          # runner 上编，不能在 arm64 runner 上跨架构出 x64（会塞进 arm64 的 pty.node，
          # 运行时报 Cannot find ./prebuilds/darwin-x64/pty.node）。
          - os: macos-15-intel
            platform_flag: "--mac"
            arch_flag: "--x64"
            artifact_glob: "opencode/packages/desktop/dist/*.dmg"
            artifact_name: cx-dmg-x64
          # .exe 用 windows runner
          - os: windows-latest
            platform_flag: "--win"
            arch_flag: ""
            artifact_glob: "opencode/packages/desktop/dist/*.exe"
            artifact_name: cx-exe
          # .AppImage 用 linux runner
          - os: ubuntu-latest
            platform_flag: "--linux"
            arch_flag: ""
            artifact_glob: "opencode/packages/desktop/dist/*.AppImage"
            artifact_name: cx-appimage
    runs-on: ${{ matrix.os }}
    env:
      # 无签名凭据时降级出未签名包（验收只要求出包，不要求签名）。
      CX_UNSIGNED: "1"
      # 上游 electron-builder 配置按 prod 通道出品牌 appId / 无后缀名。
      OPENCODE_CHANNEL: prod
      # 渠道值经 Secret 注入为环境变量（构建期由 electron.vite renderer.define
      # 内联进 renderer bundle，供余额面板读取；绝不进 git / 不进日志）。
      NEWAPI_BASE_URL: ${{ secrets.NEWAPI_BASE_URL }}
      NEWAPI_API_KEY: ${{ secrets.NEWAPI_API_KEY }}
      NEWAPI_MODEL: ${{ secrets.NEWAPI_MODEL }}
      NEWAPI_TOPUP_URL: ${{ secrets.NEWAPI_TOPUP_URL }}
    steps:
      - name: Checkout（含 opencode submodule）
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: 屏蔽渠道敏感值（::add-mask::）
        shell: bash
        run: |
          mask() { [ -n "$1" ] && echo "::add-mask::$1" || true; }
          mask "$NEWAPI_BASE_URL"
          mask "$NEWAPI_API_KEY"
          mask "$NEWAPI_MODEL"
          mask "$NEWAPI_TOPUP_URL"

      - name: 重放 brand 补丁到 opencode/
        shell: bash
        run: |
          # brand/patches/*.patch 是相对 opencode/ 的 diff，按 NN- 前缀顺序应用。
          # submodule 锁在上游 tag，定制改动全在补丁层，编译前需重放。
          shopt -s nullglob
          for p in brand/patches/*.patch; do
            echo "应用补丁：$p"
            git -C opencode apply "../$p"
          done

      - name: 安装 Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: opencode/package.json

      - name: 安装 rpm 工具（linux，deb/rpm 依赖，出 AppImage 亦更稳）
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends rpm

      - name: 安装依赖
        working-directory: opencode
        shell: bash
        run: |
          # Windows 上用 hoisted linker（对齐上游 setup-bun action 的 workaround）。
          if [ "$RUNNER_OS" = "Windows" ]; then
            bun install --linker hoisted
          else
            bun install
          fi

      - name: 构建 desktop（bun run build）
        working-directory: opencode/packages/desktop
        env:
          NODE_OPTIONS: --max-old-space-size=4096
          OPENCODE_VERSION: ${{ needs.detect.outputs.version }}
        run: bun run build

      - name: 打包（electron-builder + brand 配置）
        working-directory: opencode/packages/desktop
        timeout-minutes: 60
        shell: bash
        run: |
          # 用品牌覆盖配置出包。--publish never：只出产物，发布交给 release job。
          # 配置路径相对 desktop 目录回溯到仓库根的 brand/。
          npx electron-builder ${{ matrix.platform_flag }} ${{ matrix.arch_flag }} --publish never \
            --config ../../../brand/electron-builder.brand.ts

      - name: 上传安装包产物
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_glob }}
          if-no-files-found: error

  # ── release：汇总三平台产物，创建 / 更新 GitHub Release ────────────────
  release:
    needs:
      - detect
      - package
    if: needs.detect.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: 下载所有平台产物
        uses: actions/download-artifact@v4
        with:
          path: /tmp/artifacts
          pattern: cx-*
          merge-multiple: true

      - name: 列出待发布产物
        run: |
          echo "待发布产物："
          ls -la /tmp/artifacts || true

      - name: 创建 / 更新 GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.detect.outputs.tag }}
          BASE_TAG_FILE_NOTE: ${{ needs.detect.outputs.version }}
        run: |
          BASE_TAG="$(tr -d '[:space:]' < brand/BASE_TAG)"
          NOTES="基于 opencode $BASE_TAG 的 cx 定制发布（$TAG）。三平台安装包：.dmg / .exe / .AppImage。"
          # 已存在则覆盖上传（幂等重跑），否则新建。
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "release $TAG 已存在，覆盖上传产物。"
            gh release upload "$TAG" /tmp/artifacts/* --clobber
          else
            echo "创建 release $TAG。"
            gh release create "$TAG" \
              --title "$TAG" \
              --notes "$NOTES" \
              --target "$GITHUB_SHA" \
              /tmp/artifacts/*
          fi
