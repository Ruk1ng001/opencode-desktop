# 自动检测 + 自动发布工作流（US-013，对应 M5「跟随即发布」）。
#
# 触发：
#   - schedule：每天定时检测 openai/codex 是否有新的稳定 release。
#   - workflow_dispatch：手动触发，可指定上游 tag、可强制重发（定制后缀递增）。
#
# 流程（三段）：
#   detect  → 调用 scripts/update.sh 检测上游最新 release tag 并更新基线（brand/BASE_*）；
#             无新版本则空跑退出（不 build、不 release）；补丁重放冲突则开 issue 报警并中止。
#   build   → 复用 US-009 的 build.yml（workflow_call），三平台原生编译产出 cx 二进制。
#   release → 计算定制版本号（上游版本 + -cx.N 后缀，同版本再发则递增），创建 GitHub Release。
#
# 安全约定：
#   - 本机（维护者）不参与任何编译，全部在 CI runner 上跑。
#   - 渠道 token 等敏感值只经 GitHub Secret 注入，本工作流是「编译 + 发布裸二进制」，
#     完全不接触渠道 token / config 渲染，产物绝不含 token；日志里也不回显任何密钥。
#     发布用的 GITHUB_TOKEN 经 env 传给 gh，从不 echo。
name: release

on:
  schedule:
    # 每天 05:37 UTC 检测一次（避开整点高峰）。
    - cron: "37 5 * * *"
  workflow_dispatch:
    inputs:
      target_tag:
        description: "指定要跟随/发布的上游 release tag（如 rust-v0.143.0）；留空 = 取上游最新稳定版。"
        required: false
        type: string
        default: ""
      force:
        description: "即使上游无新版本也强制发布（用于修补丁后重发，定制后缀会递增）。"
        required: false
        type: boolean
        default: false

# 顶层默认只读；需要写的 job 各自提权。
permissions:
  contents: read

# 避免多次定时运行并发推送 main / 抢发同一版本。
concurrency:
  group: release
  cancel-in-progress: false

jobs:
  # —— 1. 检测上游新版本 + 更新基线 + 补丁重放校验 ——
  detect:
    name: 检测上游新版本
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write   # 推送基线更新到 main
      issues: write      # 补丁冲突时开 issue 报警
    outputs:
      should_release: ${{ steps.detect.outputs.should_release }}
      upstream_tag: ${{ steps.detect.outputs.upstream_tag }}
      ref: ${{ steps.commit.outputs.ref }}
    steps:
      - name: Checkout 父仓库（保留凭据以便推送基线更新）
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      # update.sh 要在 codex/ 里 fetch/checkout/apply，需要一个完整的 codex git 仓库。
      # 用完整克隆（非 --depth）保证 git apply --3way 能拿到旧基线 blob 做三方合并，
      # 避免浅克隆缺 blob 造成的误报冲突。.gitmodules 是 SSH 别名，故直接 https 克隆。
      - name: 准备 codex 源码仓库（完整克隆到当前基线）
        shell: bash
        run: |
          set -euo pipefail
          BASE_TAG="$(tr -d '[:space:]' < brand/BASE_TAG)"
          BASE_SHA="$(tr -d '[:space:]' < brand/BASE_SHA)"
          rm -rf codex
          git clone https://github.com/openai/codex.git codex
          git -C codex checkout -f "${BASE_SHA}" >/dev/null 2>&1
          echo "codex/ 已就位于当前基线 ${BASE_TAG} (${BASE_SHA})"

      - name: 检测上游最新版本并更新基线（含补丁重放）
        id: detect
        shell: bash
        run: |
          set -uo pipefail
          prev_tag="$(tr -d '[:space:]' < brand/BASE_TAG)"
          target="${{ inputs.target_tag }}"
          force="${{ inputs.force }}"

          # update.sh：无参取上游最新；有参跟随指定 tag。干净重放 exit 0，冲突 exit 1。
          set +e
          bash scripts/update.sh "$target" 2>&1 | tee /tmp/update.log
          rc=${PIPESTATUS[0]}
          set -e
          echo "update.sh 退出码：$rc"

          if [ "$rc" -ne 0 ]; then
            # 更新失败（补丁重放冲突 / tag 不存在 / 网络失败）。update.sh 已回滚基线。
            echo "conflict=true" >> "$GITHUB_OUTPUT"
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            echo "upstream_tag=$prev_tag" >> "$GITHUB_OUTPUT"
            exit 0   # 不在此失败，交给后续「开 issue」与「失败中止」步骤
          fi

          new_tag="$(tr -d '[:space:]' < brand/BASE_TAG)"

          # 是否发布：上游有新 tag，或手动指定了 tag，或手动 force 强制重发。
          should_release=false
          if [ "$new_tag" != "$prev_tag" ]; then should_release=true; fi
          if [ -n "$target" ]; then should_release=true; fi
          if [ "$force" = "true" ]; then should_release=true; fi

          if [ "$should_release" = "true" ]; then
            echo "将发布：上游 tag = $new_tag（先前基线 $prev_tag）"
          else
            echo "无新版本（上游仍为 $new_tag），空跑退出，不发布。"
          fi
          echo "conflict=false" >> "$GITHUB_OUTPUT"
          echo "should_release=$should_release" >> "$GITHUB_OUTPUT"
          echo "upstream_tag=$new_tag" >> "$GITHUB_OUTPUT"

      # —— 补丁冲突：开 issue 报警，附冲突详情，等人工修补丁后重跑 ——
      - name: 补丁冲突 → 开 issue 报警
        if: steps.detect.outputs.conflict == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          target="${{ inputs.target_tag }}"
          [ -n "$target" ] || target="上游最新稳定版"
          {
            echo "自动发布流程在「更新基线 / 补丁重放」阶段失败，已中止发布并回滚基线。"
            echo ""
            echo "- 目标上游 tag：\`${target}\`"
            echo "- 当前基线：\`$(tr -d '[:space:]' < brand/BASE_TAG)\`"
            echo "- 触发：${{ github.event_name }}"
            echo "- 运行：${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            echo ""
            echo "## 处理办法"
            echo "1. 本地 \`scripts/update.sh <目标tag>\` 复现冲突；"
            echo "2. 手动在 codex/ 上把冲突补丁改到能干净应用，运行 \`scripts/make-patches.sh\` 重新导出；"
            echo "3. 提交更新后的 \`brand/patches/\`，再手动重跑本工作流（workflow_dispatch）。"
            echo ""
            echo "## update.sh 输出（含冲突详情）"
            echo '```'
            cat /tmp/update.log
            echo '```'
          } > /tmp/issue.md
          gh issue create \
            --title "⚠️ 自动发布中止：补丁重放冲突（目标 ${target}）" \
            --body-file /tmp/issue.md

      - name: 补丁冲突 → 使工作流失败中止（不进入 build / release）
        if: steps.detect.outputs.conflict == 'true'
        shell: bash
        run: |
          echo "补丁重放冲突，已开 issue 报警，中止发布。" >&2
          exit 1

      # —— 提交基线更新到 main，并输出待编译的 commit ref ——
      - name: 提交并推送基线更新
        id: commit
        if: steps.detect.outputs.should_release == 'true'
        shell: bash
        run: |
          set -euo pipefail
          # 仅当基线文件确有变化时才提交（force 重发同一版本时无变化）。
          if [ -n "$(git status --porcelain brand/BASE_SHA brand/BASE_TAG)" ]; then
            git config user.name "cx-release-bot"
            git config user.email "cx-release-bot@users.noreply.github.com"
            git add brand/BASE_SHA brand/BASE_TAG
            git commit -m "chore: 跟随上游 ${{ steps.detect.outputs.upstream_tag }} 更新基线"
            git push origin HEAD:main
          else
            echo "基线无变化（强制重发同一上游版本），不新增提交。"
          fi
          echo "ref=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

  # —— 2. 复用 US-009 的多平台编译工作流，产出三平台 cx 二进制 ——
  build:
    name: 编译三平台二进制
    needs: detect
    if: needs.detect.outputs.should_release == 'true'
    permissions:
      contents: read
    uses: ./.github/workflows/build.yml
    with:
      artifact-prefix: release
      # 编译「基线更新后」的 commit，使 build.yml 读到新的 brand/BASE_TAG / BASE_SHA。
      ref: ${{ needs.detect.outputs.ref }}

  # —— 3. 计算定制版本号（单点计算，供打包与发布共用） ——
  version:
    name: 计算定制版本号
    needs: detect
    if: needs.detect.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    outputs:
      custom_tag: ${{ steps.ver.outputs.custom_tag }}
    steps:
      - name: 计算 v<上游版本>-cx.N
        id: ver
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          UPSTREAM_TAG: ${{ needs.detect.outputs.upstream_tag }}
        shell: bash
        run: |
          set -euo pipefail
          # 上游 tag → 基础版本号：rust-v0.142.5 → v0.142.5
          base_ver="${UPSTREAM_TAG#rust-}"
          # 查已有的 v<ver>-cx.N 定制发布，取最大 N，本次 N+1（同上游版本再发则递增）。
          pat="^$(printf '%s' "$base_ver" | sed 's/[.]/\\./g')-cx\.[0-9]+$"
          max=0
          while read -r t; do
            [ -n "$t" ] || continue
            n="${t##*-cx.}"
            if [ "$n" -gt "$max" ]; then max="$n"; fi
          done < <(gh release list --limit 300 --json tagName -q '.[].tagName' | grep -E "$pat" || true)
          next=$((max + 1))
          custom_tag="${base_ver}-cx.${next}"
          echo "上游 tag：${UPSTREAM_TAG} → 定制版本：${custom_tag}"
          echo "custom_tag=$custom_tag" >> "$GITHUB_OUTPUT"

  # —— 4. 在 macOS runner 上构建原生 .pkg（US-010） ——
  # pkgbuild/productbuild 是 macOS 专有工具，必须在 macos runner 跑。
  # 这一步会把渠道 config（含 token）渲染进 pkg，故只在发布流程里做，且经 Secret 注入。
  package_macos:
    name: 构建 macOS .pkg
    needs: [detect, build, version]
    if: needs.detect.outputs.should_release == 'true'
    runs-on: macos-14
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - name: Checkout（基线更新后的 commit，取到 installer/ 与 brand/ 脚本）
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ needs.detect.outputs.ref }}
          persist-credentials: false

      - name: 下载 arm64 编译产物
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release-aarch64-apple-darwin
          path: dist

      # render-config.sh 用了 declare -A（bash 4+），macOS 自带 /bin/bash 是 3.2。
      - name: 安装现代 bash（供 render-config.sh 使用）
        run: brew install bash

      - name: 渲染成品 config（占位符 → 真实渠道值，经 Secret 注入）
        env:
          CX_BASE_URL: ${{ secrets.CX_BASE_URL }}
          CX_TOKEN: ${{ secrets.CX_TOKEN }}
          CX_MODEL: ${{ secrets.CX_MODEL }}
        run: bash scripts/render-config.sh dist/config.toml

      - name: 构建 .pkg（payload → /usr/local/bin/cx + postinstall 写 config）
        env:
          CX_VERSION: ${{ needs.version.outputs.custom_tag }}
          # 可选签名/公证：配置了对应 Secret 才生效，否则产出未签名 .pkg。
          CX_SIGN_IDENTITY: ${{ secrets.CX_SIGN_IDENTITY }}
          CX_NOTARIZE_PROFILE: ${{ secrets.CX_NOTARIZE_PROFILE }}
        run: |
          set -euo pipefail
          chmod +x dist/cx
          bash installer/macos-pkg/build-pkg.sh \
            --binary dist/cx \
            --config dist/config.toml \
            --version "$CX_VERSION" \
            --arch arm64 \
            --out "dist/cx-${CX_VERSION}-arm64.pkg"

      - name: 上传 .pkg 产物
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: release-macos-pkg
          path: dist/cx-*.pkg
          if-no-files-found: error

  # —— 5. 汇总产物 → 创建 GitHub Release ——
  release:
    name: 创建 GitHub Release
    needs: [detect, build, version, package_macos]
    if: needs.detect.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write   # 创建 release / tag
    steps:
      - name: Checkout（基线更新后的 commit，使 release tag 指向它）
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ needs.detect.outputs.ref }}

      - name: 下载三平台编译产物 + macOS .pkg
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: release-*
          path: artifacts

      # 按目标三元组重命名，与安装器（US-010/011）探测的文件名对齐；.pkg 保留原名。
      - name: 归置发布资产（按平台命名）
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-assets
          # macOS Intel（x86_64-apple-darwin）暂时关闭，见 build.yml 矩阵注释。
          # 恢复方式：取消下面 Intel 相关行的注释，并恢复 build.yml / install.sh 对应开关。
          # cp artifacts/release-x86_64-apple-darwin/cx        release-assets/cx-x86_64-apple-darwin
          cp artifacts/release-aarch64-apple-darwin/cx       release-assets/cx-aarch64-apple-darwin
          cp artifacts/release-x86_64-pc-windows-msvc/cx.exe release-assets/cx-x86_64-pc-windows-msvc.exe
          chmod +x release-assets/cx-aarch64-apple-darwin
          # macOS 原生安装包（US-010），文件名含版本，直接透传。
          cp artifacts/release-macos-pkg/cx-*.pkg release-assets/
          ls -lh release-assets

      - name: 创建 Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          UPSTREAM_TAG: ${{ needs.detect.outputs.upstream_tag }}
          CUSTOM_TAG: ${{ needs.version.outputs.custom_tag }}
        shell: bash
        run: |
          set -euo pipefail
          custom_tag="$CUSTOM_TAG"
          echo "上游 tag：${UPSTREAM_TAG} → 定制版本：${custom_tag}"

          git_sha="$(git rev-parse HEAD)"

          # Release 说明：标注对应上游 tag 与本次定制版本。
          cat > /tmp/release-notes.md <<EOF
          基于 openai/codex 的定制跟随版本（命令名 \`cx\`）。

          - 上游 release tag：\`${UPSTREAM_TAG}\`（openai/codex）
          - 本次定制版本：\`${custom_tag}\`

          ## 包含产物
          - \`cx-${custom_tag}-arm64.pkg\`（macOS Apple Silicon 原生安装包，双击安装）
          - \`cx-aarch64-apple-darwin\`（macOS Apple Silicon 裸二进制，配合 install.sh）
          - \`cx-x86_64-pc-windows-msvc.exe\`（Windows x64 裸二进制，配合 install.ps1）

          > macOS Intel（x86_64）因 CI runner 资源紧张暂时未发布。

          macOS 用户推荐下载 \`.pkg\` 双击安装。安装/卸载与 Gatekeeper 说明见
          \`installer/macos-pkg/README.md\`。裸二进制安装参见 \`installer/\` 下的
          install.sh（Mac）/ install.ps1（Windows）。
          EOF

          gh release create "$custom_tag" \
            release-assets/* \
            --title "$custom_tag" \
            --notes-file /tmp/release-notes.md \
            --target "$git_sha"
          echo "已创建 Release：$custom_tag（tag 指向 $git_sha）"
